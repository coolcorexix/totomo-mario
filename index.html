<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>totomo-mario</title>
  </head>
  <body>
    <div id="app">
      <canvas id="game"></canvas>
      <div id="hud">
        <div id="hearts"></div>
        <div id="exp-track"><div id="exp-fill"></div></div>
        <div id="coin-badge"><span id="score">0</span></div>
        <div id="abilities">
          <div id="parry-chip" class="ability">🛡 Parry — Ctrl/X</div>
          <div id="dash-chip" class="ability hidden">⚡ Dash — Shift</div>
          <div id="jump2-chip" class="ability hidden">⤒ Double Jump</div>
          <div id="glide-chip" class="ability hidden">🕊 Glide — hold Space</div>
        </div>
      </div>
      <div id="online"><span id="online-count">1</span> online</div>
      <div id="chat-log"></div>
      <input id="chat-input" class="hidden" maxlength="80" autocomplete="off" placeholder="Say something…" />
      <div id="hint">← → move · space jump · enter chat</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
